# .github/workflows/security-assessment.yml
# 📊 MONTHLY SECURITY ASSESSMENT - Reports only (does NOT block PRs)

name: 📊 Monthly Security Assessment

on:
  schedule:
    # Run at 2:00 AM on the 1st of every month
    - cron: '0 2 1 * *'
  workflow_dispatch: # Manual trigger only
  push:
    branches: [main, develop]
    paths:
      - 'security/**'
      - '.github/workflows/security-assessment.yml'

jobs:
  security-assessment:
    name: 🔐 Security Assessment
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      issues: write
      contents: read
      actions: read
      security-events: write
    
    steps:
    - name: ⬇️ Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: 🔧 Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: 📦 Install dependencies
      run: npm ci --prefer-offline --no-audit --no-fund
    
    - name: 🚀 Start server for health check
      run: |
        npm start &
        sleep 15
        
        # Wait for server to be ready
        for i in {1..10}; do
          if curl -f http://localhost:3000/health > /dev/null 2>&1; then
            echo "✅ Server is ready on port 3000!"
            break
          elif curl -f http://localhost:3000/ > /dev/null 2>&1; then
            echo "✅ Server is ready on port 3000!"
            break
          else
            echo "Waiting for server... (attempt $i)"
            sleep 3
          fi
        done
    
    - name: 📁 Create reports directory
      run: mkdir -p security/reports
    
    - name: 🔍 Run comprehensive security assessment
      id: assessment
      env:
        NODE_ENV: production
        SUPABASE_URL: ${{ secrets.SUPABASE_URL || 'https://example.supabase.co' }}
        SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY || 'test-key' }}
        JWT_SECRET: ${{ secrets.JWT_SECRET || 'test-secret' }}
      run: |
        echo "📊 Starting comprehensive security assessment..."
        
        # Generate detailed security report
        TIMESTAMP=$(date -u +"%Y-%m-%dT%H-%M-%S")
        REPORT_FILE="security/reports/security-assessment-${TIMESTAMP}.json"
        
        node -e "
          const fs = require('fs');
          const os = require('os');
          
          // Collect system info
          const systemInfo = {
            node_version: process.version,
            platform: os.platform(),
            arch: os.arch(),
            cpu_count: os.cpus().length,
            total_memory: os.totalmem(),
            free_memory: os.freemem()
          };
          
          // Collect dependency info
          let dependencies = {};
          try {
            const pkg = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            dependencies = {
              total: Object.keys(pkg.dependencies || {}).length + Object.keys(pkg.devDependencies || {}).length,
              production: Object.keys(pkg.dependencies || {}).length,
              development: Object.keys(pkg.devDependencies || {}).length
            };
          } catch(e) {
            dependencies = { error: e.message };
          }
          
          // Check for security headers
          const securityHeaders = {
            helmet: false,
            cors: false,
            rateLimit: false
          };
          
          try {
            const serverContent = fs.readFileSync('server.js', 'utf8');
            securityHeaders.helmet = serverContent.includes('helmet');
            securityHeaders.cors = serverContent.includes('cors');
            securityHeaders.rateLimit = serverContent.includes('rateLimit') || serverContent.includes('express-rate-limit');
          } catch(e) {}
          
          // Generate report
          const report = {
            timestamp: new Date().toISOString(),
            commit_sha: process.env.GITHUB_SHA || 'unknown',
            repository: process.env.GITHUB_REPOSITORY || 'unknown',
            system_info: systemInfo,
            dependencies: dependencies,
            security_headers: securityHeaders,
            security_score: 85,
            findings: [],
            recommendations: []
          };
          
          // Add findings based on checks
          if (!securityHeaders.helmet) {
            report.findings.push({ severity: 'medium', message: 'Helmet.js not detected - missing security headers' });
            report.recommendations.push('Add helmet.js for security headers');
            report.security_score -= 10;
          }
          
          if (!securityHeaders.rateLimit) {
            report.findings.push({ severity: 'medium', message: 'Rate limiting not detected - vulnerable to DoS attacks' });
            report.recommendations.push('Implement rate limiting with express-rate-limit');
            report.security_score -= 10;
          }
          
          if (dependencies.production > 50) {
            report.findings.push({ severity: 'low', message: 'Large number of production dependencies increases attack surface' });
            report.recommendations.push('Review and reduce production dependencies');
            report.security_score -= 5;
          }
          
          // Add generic recommendations
          report.recommendations.push(
            'Enable 2FA for all GitHub accounts with write access',
            'Run \`npm audit fix\` monthly to address vulnerabilities',
            'Review and rotate API keys and secrets quarterly',
            'Implement logging and monitoring for security events'
          );
          
          // Ensure score doesn't go below 0
          report.security_score = Math.max(0, report.security_score);
          
          // Write report
          fs.writeFileSync('$REPORT_FILE', JSON.stringify(report, null, 2));
          
          // Create markdown summary
          const summary = `# 🔐 Security Assessment Report\n\n` +
            `**Date:** ${report.timestamp}\n` +
            `**Repository:** ${report.repository}\n` +
            `**Commit:** ${report.commit_sha.substring(0, 7)}\n\n` +
            `## Overall Score: ${report.security_score}/100\n\n` +
            `## Findings (${report.findings.length})\n\n` +
            report.findings.map(f => `- **${f.severity.toUpperCase()}:** ${f.message}`).join('\n') + `\n\n` +
            `## Recommendations\n\n` +
            report.recommendations.map(r => `- ${r}`).join('\n');
          
          fs.writeFileSync('security/reports/security-assessment-summary.md', summary);
          
          // Output for GitHub Actions
          console.log('security_score=' + report.security_score);
          console.log('findings_count=' + report.findings.length);
          console.log('report_file=$REPORT_FILE');
        " | tee -a $GITHUB_OUTPUT
        
        echo "✅ Security assessment completed"
    
    - name: 📤 Upload security reports
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: security-assessment-reports-${{ github.run_number }}
        path: security/reports/
        retention-days: 90
    
    - name: 📝 Create assessment summary
      run: |
        echo "## 📊 Security Assessment Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
        echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
        echo "| **Security Score** | ${{ steps.assessment.outputs.security_score }}/100 |" >> $GITHUB_STEP_SUMMARY
        echo "| **Findings** | ${{ steps.assessment.outputs.findings_count }} |" >> $GITHUB_STEP_SUMMARY
        echo "| **Timestamp** | $(date -u) |" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "📄 Full report available in artifacts: \`security-assessment-reports-${{ github.run_number }}\`" >> $GITHUB_STEP_SUMMARY
    
    - name: 🐛 Create issue for critical findings (score < 70)
      if: steps.assessment.outputs.security_score < 70
      uses: actions/github-script@v7
      with:
        script: |
          const score = parseInt('${{ steps.assessment.outputs.security_score }}');
          const findings = parseInt('${{ steps.assessment.outputs.findings_count }}');
          const runId = '${{ github.run_id }}';
          
          const body = `## 🚨 Security Score Alert: ${score}/100
          
          A monthly security assessment has detected security issues that require attention.
          
          ### Assessment Results
          - **Security Score:** ${score}/100
          - **Findings:** ${findings} issues detected
          - **Run ID:** ${runId}
          
          ### Recommended Actions
          1. Review the detailed security report in the workflow artifacts
          2. Address the identified findings
          3. Re-run the security assessment after fixes
          
          ### How to Fix
          - Download the assessment reports from [GitHub Actions](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${runId})
          - Follow the recommendations in the report
          - Consider running \`npm audit fix\` to address dependency vulnerabilities
          
          This issue was automatically created by the Monthly Security Assessment workflow.`;
          
          await github.rest.issues.create({
            owner: context.repo.owner,
            repo: context.repo.repo,
            title: `🚨 Security Assessment Alert: Score ${score}/100 (Needs Improvement)`,
            body: body,
            labels: ['security', 'automated', 'priority-medium']
          });
    
    - name: ✅ Create success comment for good scores (score >= 70)
      if: steps.assessment.outputs.security_score >= 70 && github.event_name == 'workflow_dispatch'
      run: |
        echo "✅ Security assessment passed with score ${{ steps.assessment.outputs.security_score }}/100"
        echo "No critical issues found. Good job! 🎉"