global:
  scrape_interval: 5s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['localhost:9093']

rule_files:
  - "prometheus_alert_rules.yml"

scrape_configs:
  - job_name: "nutrihelp-backend"
    metrics_path: /api/metrics
    static_configs:
      - targets: ["localhost:80"]
